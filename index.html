<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metronome 2</title>
  </head>
  <body>
    <div id="metronome">
      <div class="beats flex gap-3">
        <div class="beat-dot w-6 h-6 rounded-full bg-gray-400"></div>
        <div class="beat-dot w-6 h-6 rounded-full bg-gray-400"></div>
        <div class="beat-dot w-6 h-6 rounded-full bg-gray-400"></div>
        <div class="beat-dot w-6 h-6 rounded-full bg-gray-400"></div>
      </div>

      <div class="tempo-wrapper">
        <button id="tempoDown" class="btn btn-outline btn-sm">-1</button>
        <button id="tempoDown5" class="btn btn-outline btn-sm ml-1">-5</button>
        <div class="tempo">
          <input type="range" min="30" max="240" value="100" id="myRange">
          <span id="rangeDisplay" type="text"></span>
        </div>
        <button id="tempoUp" class="btn btn-outline btn-sm">+1</button>
        <button id="tempoUp5" class="btn btn-outline btn-sm ml-1">+5</button>
      </div>      
      <div class="beat-display"></div>
      <div class="beat-display"></div>
      <button id="playButton" class="btn btn-primary btn-lg">Play</button>
      <button id="stopButton" class="btn btn-error btn-lg ml-2">Stop</button>
      <div>     
        <input type="checkbox" class="accent-button" id="accentButton" checked></input>
        <label for="accent">Accent</label>
      </div>

      <button id="tapTempoButton" class="btn btn-secondary">Tap Tempo</button>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
