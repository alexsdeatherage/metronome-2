<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>metronome</title>
  </head>
  <body>
    <div id="metronome">
      <div class="bpm-display"></div>
      <div class="tempo-title"></div>
      <div class="tempo-wrapper">
        <button class="tempo-decrease" id="tempoDown">-1</button>
        <button class="tempo-decrease" id="tempoDown5">-5</button>
        <div class="tempo">
          <input type="range" min="30" max="240" value="100" id="myRange">
          <span id="rangeDisplay" type="text"></span>
        </div>
        <button class="tempo-increase" id="tempoUp">+1</button>
        <button class="tempo-increase" id="tempoUp5">+5</button>
      </div>      
      <div class="beat-display"></div>
      <div class="beat-display"></div>
      <button class="play-button" id="playButton" >Play</button>
      <button class="stop-button" id="stopButton">Stop</button>
      <div>     
        <input type="checkbox" class="accent-button" id="accentButton" checked></input>
        <label for="accent">Accent</label>
      </div>

      <button class="tap-tempo-button" id="tapTempoButton">Tap Tempo</button>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
